# .github/workflows/release.yml
on:
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - os-name: Linux-aarch64
            runs-on: ubuntu-24.04
            target: aarch64-unknown-linux-musl
          - os-name: macOS-x86_64
            runs-on: macos-15-intel
            target: x86_64-apple-darwin
          - os-name: macOS-aarch64
            runs-on: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: cross build --locked --release --target ${{ matrix.platform.target }}

      - name: Create release artifact
        run: |
          mkdir -p artifacts
          cd target/${{ matrix.platform.target }}/release

          # Find the gitsync binary (it might not have an extension on Unix)
          if [ -f gitsync ]; then
            chmod +x gitsync
            tar -czf ../../../../../../artifacts/gitsync-${{ matrix.platform.target }}.tar.gz gitsync
          elif [ -f gitsync.exe ]; then
            tar -czf ../../../../../../artifacts/gitsync-${{ matrix.platform.target }}.zip gitsync.exe
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gitsync-${{ matrix.platform.target }}-release
          path: artifacts/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          for file in gitsync-*; do
            if [ -f "$file" ]; then
              gh release upload ${{ github.event.release.tag_name }} "$file"
            fi
          done
